services:
  fastapi:
    build: .
    ports:
      - "8082:80"
    volumes:
      - .:/code/app
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    container_name: minio
    shm_size: 1G
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - ./minio/data:/data
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin