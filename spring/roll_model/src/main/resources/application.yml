spring:
  config:
    import: optional:file:.env[.properties]
  profiles:
    group:
      prod:
        - db
        - auth
        - storage
        - fastapi
        - ai
    active: ${SPRING_PROFILES_ACTIVE}

# 서버 포트 설정
server:
  servlet:
    encoding:
      charset: UTF-8
      force: true
  baseUrl: ${BASE_URL}
  port: ${SERVER_PORT:8080}
  tomcat:
    connection-timeout: 20000ms
    max-connections: 10000
    accept-count: 100
    keep-alive-timeout: 30s


logging:
  level:
#    javax.management.remote.rmi: ERROR
#    sun.rmi: ERROR
#    jdk.internal.httpclient: ERROR
    root: INFO
